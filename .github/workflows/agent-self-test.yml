name: Yuanbao Agent Self Test

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      scenario:
        description: "Agent scenario to run"
        required: false
        default: "dev_self_test"
      target_url:
        description: "External GUI target URL"
        required: false
        default: "local-demo-web"

permissions:
  contents: read
  issues: write

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ensure waiting regression issue exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = '\u5f85\u56de\u5f52';
            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'D93F0B',
                  description: 'Yuanbao Agent waiting regression bug'
                });
              } else {
                throw error;
              }
            }
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labelName,
              per_page: 1
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title: '[???] Notification switch regression in demo settings page',
                body: [
                  'Regression steps:',
                  '1. Open Yuanbao Demo Web.',
                  '2. Login and enter the My page.',
                  '3. Enter Settings and turn off notification switch.',
                  '4. Re-enter Settings.',
                  '',
                  'Expected: notification switch remains off.',
                  'Actual: notification switch may be shown as on again.'
                ].join('\n'),
                labels: [labelName]
              });
            }
      - name: Run unit tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests
      - name: Run external substitute acceptance
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          PYTHONPATH=src python - <<'PY'
          import json
          from tempfile import TemporaryDirectory
          from pathlib import Path
          from yuanbao_agent_platform.platform import YuanbaoTestingPlatform
          with TemporaryDirectory() as tmpdir:
              platform = YuanbaoTestingPlatform(db_path=str(Path(tmpdir) / "platform.db"))
              report = platform.run_external_acceptance_demo()
              print(json.dumps(report["summary"], ensure_ascii=False, indent=2))
              assert report["summary"]["external_substitute_acceptance_passed"]
          PY
