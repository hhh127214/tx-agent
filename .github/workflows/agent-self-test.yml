name: Yuanbao Agent Self Test

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      scenario:
        description: "Agent scenario to run"
        required: false
        default: "dev_self_test"
      target_url:
        description: "External GUI target URL"
        required: false
        default: "local-demo-web"

permissions:
  contents: read
  issues: write

jobs:
  self-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ensure waiting regression issue exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const labelName = '待回归';
            try {
              await github.rest.issues.getLabel({ owner, repo, name: labelName });
            } catch (error) {
              if (error.status === 404) {
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: labelName,
                  color: 'D93F0B',
                  description: 'Yuanbao Agent 待回归缺陷'
                });
              } else {
                throw error;
              }
            }
            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: labelName,
              per_page: 1
            });
            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner,
                repo,
                title: '【待回归】关闭通知开关后重新进入设置页仍显示开启',
                body: [
                  '复现步骤：',
                  '1. 打开 Yuanbao Demo Web。',
                  '2. 登录后进入我的页面。',
                  '3. 进入设置页并关闭通知开关。',
                  '4. 重新进入设置页。',
                  '',
                  '期望结果：通知开关保持关闭。',
                  '实际结果：通知开关可能重新显示开启。'
                ].join('\n'),
                labels: [labelName]
              });
            }
      - name: Run unit tests
        run: |
          PYTHONPATH=src python -m unittest discover -s tests
      - name: Run external substitute acceptance
        run: |
          PYTHONPATH=src python - <<'PY'
          import json
          from tempfile import TemporaryDirectory
          from pathlib import Path
          from yuanbao_agent_platform.platform import YuanbaoTestingPlatform
          with TemporaryDirectory() as tmpdir:
              platform = YuanbaoTestingPlatform(db_path=str(Path(tmpdir) / "platform.db"))
              report = platform.run_external_acceptance_demo()
              print(json.dumps(report["summary"], ensure_ascii=False, indent=2))
              assert report["summary"]["external_substitute_acceptance_passed"]
          PY
